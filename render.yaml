services:
  - type: web
    runtime: node
    name: embu-past-papers-api
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health/live
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PAPERS_BUCKET
        value: papers
      - key: SUPABASE_UPLOADS_BUCKET
        value: uploads
      - key: STRICT_STARTUP
        value: "false"
      - key: MPESA_ENV
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_ACCOUNT_REF
        value: UEPPASTPAPERS
      - key: MPESA_TRANSACTION_DESC
        value: Past Papers Subscription
